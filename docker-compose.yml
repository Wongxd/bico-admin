services:
  app:
    build: .
    image: bico-admin:latest
    container_name: bico-admin
    ports:
      - "8080:8080"
    volumes:
      - ./storage:/app/storage
    environment:
      TZ: Asia/Shanghai
      BICO_JWT_SECRET: ${BICO_JWT_SECRET:?请设置 BICO_JWT_SECRET}
      BICO_ADMIN_INITIAL_PASSWORD: ${BICO_ADMIN_INITIAL_PASSWORD:-}
      BICO_DATABASE_MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请设置 MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bico-network

  mysql:
    image: mysql:8.0
    container_name: bico-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?请设置 MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: bico_admin
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - bico-network

  redis:
    image: redis:7-alpine
    container_name: bico-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - bico-network

volumes:
  mysql-data:
  redis-data:

networks:
  bico-network:
    driver: bridge
